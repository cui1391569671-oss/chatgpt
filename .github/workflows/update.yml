name: update news

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install rss-parser

      - run: node fetch.js

      - run: |
          git config user.name github-actions
          git add news.json
          git commit -m update || exit 0
          git push
